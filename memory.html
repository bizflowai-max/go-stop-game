<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2d1b4e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>Memory Match - Jenny</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg: #2d1b4e; --gold: #ffd700; }
        html, body { height: 100%; overflow: hidden; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg);
            background-image: radial-gradient(ellipse at 50% 30%, #4a2b6e 0%, var(--bg) 70%);
            color: white; 
            touch-action: manipulation;
            display: flex;
            flex-direction: column;
        }
        .game { flex: 1; padding: 15px; display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; width: 100%; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .header h1 { font-size: 1.4rem; color: var(--gold); text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .stats { display: flex; gap: 12px; font-size: 0.9rem; }
        .stats span { background: rgba(255,255,255,0.15); padding: 5px 12px; border-radius: 15px; }
        
        .grid { 
            flex: 1; 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 8px; 
            align-content: center;
        }
        .card {
            aspect-ratio: 3/4;
            background: #4a3b6e;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            -webkit-tap-highlight-color: transparent;
        }
        .card:hover { transform: scale(1.03); }
        .card.flipped { background: white; transform: rotateY(180deg); }
        .card.matched { background: #2ecc71; animation: pulse 0.4s; }
        .card .front { display: none; }
        .card.flipped .front { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
        .card .back { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; font-size: 1.4rem; }
        .card.flipped .back { display: none; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
        
        .install-btn {
            background: linear-gradient(135deg, var(--gold), #ffb800);
            color: #1a1a1a;
            border: none;
            padding: 12px 24px;
            font-size: 0.9rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            display: none;
            width: 100%;
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
        }
        .install-btn.show { display: block; }
        
        .love { text-align: center; color: #ff9eb5; font-size: 0.85rem; margin-top: 10px; }
        
        .win { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.92); 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 100;
        }
        .win.show { display: flex; }
        .win h1 { font-size: 2.5rem; color: var(--gold); margin-bottom: 20px; }
        .win p { font-size: 1.2rem; margin-bottom: 25px; }
        .btn { 
            background: linear-gradient(135deg, var(--gold), #ffb800); 
            color: #1a1a1a; border: none; padding: 14px 32px; 
            font-size: 1.1rem; border-radius: 25px; cursor: pointer; font-weight: bold; 
        }
    </style>
</head>
<body>
    <div class="game">
        <div class="header">
            <h1>♠ Memory</h1>
            <div class="stats">
                <span>🎯 <span id="moves">0</span></span>
                <span>⏱️ <span id="time">0</span></span>
            </div>
        </div>
        <div class="grid" id="grid"></div>
        <button class="install-btn" id="installBtn">📱 앱으로 설치하기</button>
        <div class="love">Made with ❤️ for Jenny</div>
    </div>
    <div class="win" id="win">
        <h1>🎉 You Win!</h1>
        <p>Moves: <span id="fm">0</span> | Time: <span id="ft">0</span>s</p>
        <button class="btn" onclick="newGame()">Play Again</button>
    </div>
    
    <script>
        const emojis = ["🌸","🌺","🌻","🌷","🌹","🍀","🍁","🍎"];
        let cards = [], flipped = [], matched = 0, moves = 0, time = 0, timer = null, lock = false;
        
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.add('show');
        });
        
        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            await deferredPrompt.userChoice;
            deferredPrompt = null;
            installBtn.classList.remove('show');
        });
        
        window.addEventListener('appinstalled', () => {
            installBtn.classList.remove('show');
        });
        
        function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
        
        function newGame(){
            cards = shuffle([...emojis,...emojis]);
            flipped = []; matched = 0; moves = 0; time = 0; lock = false;
            clearInterval(timer); timer = setInterval(()=>{time++; document.getElementById("time").innerText=time},1000);
            document.getElementById("moves").innerText = 0;
            document.getElementById("time").innerText = 0;
            document.getElementById("win").classList.remove("show");
            render();
        }
        
        function render(){
            const g = document.getElementById("grid");
            g.innerHTML = cards.map((c,i)=>`<div class="card" data-i="${i}" onclick="flip(${i})">
                <div class="back">🎴</div>
                <div class="front">${c}</div>
            </div>`).join('');
        }
        
        function flip(i){
            if(lock||flipped.includes(i)||matched>=16)return;
            const el = document.querySelector('[data-i="'+i+'"]');
            el.classList.add("flipped");
            flipped.push(i);
            if(flipped.length==2){
                moves++; document.getElementById("moves").innerText=moves;
                lock=true;
                if(cards[flipped[0]]==cards[flipped[1]]){
                    matched+=2;
                    setTimeout(()=>{
                        flipped.forEach(fi=>document.querySelector('[data-i="'+fi+'"]').classList.add("matched"));
                        flipped=[]; lock=false;
                        if(matched>=16){clearInterval(timer);document.getElementById("fm").innerText=moves;document.getElementById("ft").innerText=time;document.getElementById("win").classList.add("show")}
                    },300);
                }else{
                    setTimeout(()=>{flipped.forEach(fi=>document.querySelector('[data-i="'+fi+'"]').classList.remove("flipped"));flipped=[];lock=false},800);
                }
            }
        }
        
        newGame();
    <\/script>
</body>
</html>
