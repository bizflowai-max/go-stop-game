<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2d1b4e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>Memory Match - 카드 맞추기</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg: #2d1b4e; --gold: #ffd700; --card-back: #4a3b6e; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg);
            background-image: radial-gradient(ellipse at 50% 0%, #4a2b6e 0%, var(--bg) 60%);
            min-height: 100vh; color: white; overflow: hidden; touch-action: manipulation;
        }
        .game { padding: 15px; max-width: 500px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .header h1 { font-size: 1.3rem; color: var(--gold); text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .stats { display: flex; gap: 15px; font-size: 0.9rem; }
        .stats span { background: rgba(255,255,255,0.15); padding: 5px 12px; border-radius: 15px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .card {
            aspect-ratio: 3/4;
            background: var(--card-back);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            transition: transform 0.3s, background 0.3s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
        }
        .card:hover { transform: scale(1.05); }
        .card.flipped { background: white; transform: rotateY(180deg); }
        .card.matched { background: #2ecc71; animation: pulse 0.5s; }
        .card .front { display: none; }
        .card.flipped .front { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; font-size: 2.2rem; }
        .card .back { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; font-size: 1.5rem; }
        .card.flipped .back { display: none; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
        .win { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 100;
        }
        .win.show { display: flex; }
        .win h1 { font-size: 2.5rem; color: var(--gold); margin-bottom: 20px; animation: bounce 1s infinite; }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        .win p { font-size: 1.2rem; margin-bottom: 25px; }
        .btn { 
            background: linear-gradient(135deg, var(--gold), #ffb800); 
            color: #1a1a1a; border: none; padding: 12px 30px; 
            font-size: 1rem; border-radius: 25px; cursor: pointer; font-weight: bold; 
        }
        .love { text-align: center; color: #ff9eb5; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="game">
        <div class="header">
            <h1>♠ Memory Match</h1>
            <div class="stats">
                <span>🎯 <span id="moves">0</span></span>
                <span>⏱️ <span id="time">0</span></span>
            </div>
        </div>
        <div class="grid" id="grid"></div>
        <div class="love">Made with ❤️ for Jenny</div>
    </div>
    <div class="win" id="win">
        <h1>🎉 You Win!</h1>
        <p>Moves: <span id="fm">0</span> | Time: <span id="ft">0</span>s</p>
        <button class="btn" onclick="newGame()">Play Again</button>
    </div>
    <script>
        const emojis = ["🌸","🌺","🌻","🌷","🌹","🍀","🍁","🍎"];
        let cards = [], flipped = [], matched = 0, moves = 0, time = 0, timer = null, lock = false;
        
        function shuffle(a){for(let i=a.length-1;i0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
        
        function newGame(){
            cards = shuffle([...emojis,...emojis]);
            flipped = []; matched = 0; moves = 0; time = 0; lock = false;
            clearInterval(timer); timer = setInterval(()=>{time++; document.getElementById("time").innerText=time},1000);
            document.getElementById("moves").innerText = 0;
            document.getElementById("time").innerText = 0;
            document.getElementById("win").classList.remove("show");
            render();
        }
        
        function render(){
            const g = document.getElementById("grid");
            g.innerHTML = cards.map((c,i)=>`<div class="card" data-i="${i}" onclick="flip(${i})">
                <div class="back">🎴</div>
                <div class="front">${c}</div>
            </div>`).join('');
        }
        
        function flip(i){
            if(lock||flipped.includes(i)||matched>=16)return;
            const el = document.querySelector(`[data-i="${i}"]`);
            el.classList.add("flipped");
            flipped.push(i);
            if(flipped.length==2){
                moves++; document.getElementById("moves").innerText=moves;
                lock=true;
                if(cards[flipped[0]]==cards[flipped[1]]){
                    matched+=2;
                    setTimeout(()=>{
                        flipped.forEach(fi=>document.querySelector(`[data-i="${fi}"]`).classList.add("matched"));
                        flipped=[]; lock=false;
                        if(matched>=16){clearInterval(timer);document.getElementById("fm").innerText=moves;document.getElementById("ft").innerText=time;document.getElementById("win").classList.add("show")}
                    },300);
                }else{
                    setTimeout(()=>{flipped.forEach(fi=>document.querySelector(`[data-i="${fi}"]`).classList.remove("flipped"));flipped=[];lock=false},800);
                }
            }
        }
        
        newGame();
    <\/script>
</body>
</html>
